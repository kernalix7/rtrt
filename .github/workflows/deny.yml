name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-run weekly so newly-disclosed advisories surface even without a code change.
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check
        run: cargo deny check licenses sources bans advisories
