# cargo-deny configuration for RTRT.
#
# Run locally with:
#   cargo install --locked cargo-deny
#   cargo deny check
#
# CI gate: .github/workflows/deny.yml (blocking on PRs to main).
#
# Schema: cargo-deny 0.19+. The older `unlicensed = "deny"` / `copyleft = "deny"`
# keys are gone; the modern shape is just `allow` + `confidence-threshold` +
# `exceptions`, with deny-by-default for anything not on the allowlist.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------- licenses ----------
[licenses]
# All dependencies must resolve to a license in this allowlist. The set covers
# the permissive licenses found in our actual dep tree as of v0.2 (run
# `cargo deny check licenses` to see the canonical list). Any addition outside
# this set requires an explicit decision documented in a PR.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "0BSD",
    "MPL-2.0",                # weak copyleft, redistributable
    "BSL-1.0",
    "CDLA-Permissive-2.0",    # webpki-roots ≥ 1.0.7 (TLS root cert bundle)
]
confidence-threshold = 0.93

# Permit `ring` specifically. Its license is OpenSSL + ISC + a custom clause
# that crates.io classifies as a non-standard expression. The terms themselves
# are permissive but the SPDX expression is not, hence the per-crate exception.
[[licenses.exceptions]]
name = "ring"
allow = ["ISC", "MIT", "OpenSSL"]

# ---------- advisories ----------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ---------- bans ----------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    # add specific crate bans here as we discover problematic deps
]

# ---------- sources ----------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
