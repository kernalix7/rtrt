name: coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-run weekly so coverage drift surfaces even without a code change.
    - cron: '23 5 * * 1'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  llvm-cov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov
      - name: Run coverage (default features)
        # --fail-under-lines enforces a regression floor. Measured line
        # coverage was ~38% when the floor was introduced; keep the floor a
        # few points below the last measured value and ratchet it up as
        # coverage improves — never down.
        run: |
          cargo llvm-cov --workspace \
            --lcov --output-path lcov.info \
            --fail-under-lines 35 \
            --ignore-filename-regex '(benches|tests|examples)/'
      - name: Summary
        run: cargo llvm-cov report
      - uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error
